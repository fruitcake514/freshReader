<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FreshReader</title>
  <meta name="description" content="Mobile PWA client for FreshRSS" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#b45309" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FreshReader" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1170x2532.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1179x2556.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1290x2796.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:428px) and (device-height:926px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1284x2778.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1125x2436.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:2)" href="splash/splash-828x1792.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2)" href="splash/splash-750x1334.png"/>
  <meta name="msapplication-TileColor" content="#b45309" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --serif: 'Source Serif 4', Georgia, serif;
      --display: 'Playfair Display', Georgia, serif;
      --bg: #f5f0e8; --bg2: #ede8e0; --bg3: #d8d2c8;
      --surface: #faf8f4; --border: #d8d2c8;
      --text: #1c1917; --text2: #57534e; --text3: #a8a29e;
      --accent: #b45309; --accent-bg: #fef3c7;
      --unread: #dc2626; --link: #0f4c81;
      --radius: 12px; --radius-sm: 8px;
      --nav-h: 52px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#111118; --bg2:#1a1a25; --bg3:#22222f;
        --surface:#16161f; --border:#2e2e3e;
        --text:#e8e6e3; --text2:#9b98a8; --text3:#5a5870;
        --accent:#f59e0b; --accent-bg:#292310;
        --unread:#f87171; --link:#93c5fd;
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;-webkit-text-size-adjust:100%}
    body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100%;overflow-x:hidden;line-height:1.6}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    input{font-family:inherit}
    a{color:var(--link)}
    img{max-width:100%;height:auto}
    video{max-width:100%}

    /* ── SCREENS ── */
    .screen{display:none;min-height:100dvh;flex-direction:column}
    .screen.active{display:flex}

    /* ── STATUS BAR SPACER ── */
    .sb{height:var(--safe-top);background:var(--surface);flex-shrink:0;position:sticky;top:0;z-index:60}

    /* ── LOGIN ── */
    #login-screen{align-items:center;justify-content:center;padding:24px;padding-top:calc(24px + var(--safe-top))}
    .login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
    .login-logo{text-align:center;margin-bottom:28px}
    .login-logo h1{font-family:var(--display);font-size:2rem;font-weight:700;letter-spacing:-.03em}
    .login-logo p{font-size:.875rem;color:var(--text3);margin-top:4px;font-style:italic}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
    .field input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:1rem;outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--accent)}
    .btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-size:1rem;font-weight:600;margin-top:6px;transition:opacity .15s,transform .1s; cursor:pointer;}
    .btn-primary:active{transform:scale(.98)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .login-err{margin-top:10px;padding:9px 13px;background:#fee2e2;color:#991b1b;border-radius:var(--radius-sm);font-size:.85rem;display:none}
    @media(prefers-color-scheme:dark){.login-err{background:#2d1515;color:#fca5a5}}

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:var(--safe-top);z-index:50;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:6px;
      padding:0 12px;height:var(--nav-h);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .topbar-title{font-family:var(--display);font-size:1.2rem;font-weight:700;letter-spacing:-.02em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--text2);transition:background .15s,color .15s;flex-shrink:0}
    .icon-btn:hover,.icon-btn:focus-visible{background:var(--bg2);color:var(--text)}
    .icon-btn svg{width:19px;height:19px}

    /* ── CATEGORY BAR ── */
    .cat-bar{
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;gap:4px;padding:7px 10px;
      overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
      position:sticky;top:calc(var(--safe-top) + var(--nav-h));z-index:40;
    }
    .cat-bar::-webkit-scrollbar{display:none}
    .cat-tab{
      display:inline-flex;align-items:center;gap:5px;padding:5px 13px;
      border-radius:100px;font-size:.8rem;font-weight:600;white-space:nowrap;
      color:var(--text2);border:1.5px solid transparent;transition:all .15s;flex-shrink:0;
    }
    .cat-tab:hover{background:var(--bg2);color:var(--text)}
    .cat-tab.active{background:var(--accent-bg);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
    .cat-tab .badge{background:var(--unread);color:#fff;font-size:.65rem;font-weight:700;border-radius:100px;padding:1px 5px}

    /* ── FEED BAR ── */
    .feed-bar{
      background:var(--bg2);border-bottom:1px solid var(--border);
      display:flex;gap:5px;padding:6px 10px;
      overflow-x:auto;scrollbar-width:none;
    }
    .feed-bar::-webkit-scrollbar{display:none}
    .feed-bar.hidden{display:none}
    .feed-tab{
      display:inline-flex;align-items:center;gap:4px;padding:4px 11px;
      border-radius:6px;font-size:.75rem;font-weight:600;white-space:nowrap;
      color:var(--text2);background:var(--surface);border:1px solid var(--border);
      transition:all .15s;flex-shrink:0;
    }
    .feed-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .feed-tab .badge{background:rgba(255,255,255,.25);font-size:.6rem;font-weight:700;border-radius:4px;padding:1px 4px}
    .feed-tab:not(.active) .badge{background:var(--bg3);color:var(--text3)}

    /* ── FILTER BAR ── */
    .filter-bar{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface);
    }
    .filter-pills{display:flex;gap:5px}
    .filter-btn{font-size:.72rem;font-weight:600;color:var(--text2);padding:4px 9px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
    .filter-btn.active{background:var(--accent-bg);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
    .mark-all-btn{font-size:.72rem;font-weight:600;color:var(--text3);padding:4px 8px}
    .mark-all-btn:hover{color:var(--text)}

    /* ── ARTICLE LIST ── */
    .article-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe-bottom))}
    .article-card{
      padding:14px 18px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:background .1s;position:relative;
      display:flex;flex-direction:column;gap:5px;
    }
    .article-card:active{background:var(--bg2)}
    .article-card.read{opacity:.6}
    .article-card.read .card-title{font-weight:400}
    .card-meta{display:flex;align-items:center;gap:7px;font-size:.72rem;color:var(--text3)}
    .card-feed{font-weight:600;color:var(--accent);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card-title{font-family:var(--display);font-size:1rem;font-weight:700;line-height:1.3;letter-spacing:-.015em}
    .card-snippet{font-size:.85rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-thumb{width:68px;height:52px;border-radius:7px;object-fit:cover;flex-shrink:0;float:right;margin-left:10px;margin-bottom:3px}
    .unread-dot{width:7px;height:7px;background:var(--unread);border-radius:50%;flex-shrink:0;margin-left:auto}

    /* ── EMPTY / LOADING ── */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:10px;color:var(--text3);text-align:center}
    .empty svg{opacity:.35}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .skel{animation:pulse 1.4s infinite}
    .skel-line{height:13px;background:var(--bg3);border-radius:4px;margin-bottom:7px}

    /* ── READER SCREEN ── */
    #reader-screen{background:var(--bg)}
    .reader-topbar{
      position:sticky;top:var(--safe-top);z-index:50;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:6px;
      padding:0 10px;height:var(--nav-h);backdrop-filter:blur(12px);
    }
    .reader-topbar-feed{flex:1;font-size:.85rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .reader-counter{font-size:.72rem;color:var(--text3);white-space:nowrap;flex-shrink:0}
    .reader-swipe{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:transform .24s cubic-bezier(.4,0,.2,1),opacity .18s}
    .reader-swipe.out-left{transform:translateX(-60px);opacity:0;pointer-events:none}
    .reader-swipe.out-right{transform:translateX(60px);opacity:0;pointer-events:none}
    .reader-swipe.in-left{transform:translateX(60px);opacity:0;transition:none}
    .reader-swipe.in-right{transform:translateX(-60px);opacity:0;transition:none}
    .reader-body{max-width:680px;margin:0 auto;padding:20px 18px calc(80px + var(--safe-bottom))}
    .reader-feed-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
    .reader-title{font-family:var(--display);font-size:clamp(1.4rem,5vw,2rem);font-weight:700;line-height:1.2;letter-spacing:-.03em;margin-bottom:14px}
    .reader-byline{font-size:.8rem;color:var(--text3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
    .reader-content{font-size:1.05rem;line-height:1.75;color:var(--text)}
    .reader-content h1,.reader-content h2,.reader-content h3{font-family:var(--display);margin:1.4em 0 .4em;line-height:1.2;letter-spacing:-.02em}
    .reader-content h1{font-size:1.6rem}.reader-content h2{font-size:1.3rem}.reader-content h3{font-size:1.1rem}
    .reader-content p{margin-bottom:1.2em}
    .reader-content ul,.reader-content ol{padding-left:1.4em;margin-bottom:1.2em}
    .reader-content li{margin-bottom:.35em}
    .reader-content blockquote{border-left:3px solid var(--accent);margin:1.4em 0;padding:.6em .9em;background:var(--accent-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-style:italic}
    .reader-content pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.9em;overflow-x:auto;font-size:.875em;margin-bottom:1.2em}
    .reader-content code{background:var(--bg3);padding:.12em .35em;border-radius:4px;font-size:.9em}
    .reader-content pre code{background:none;padding:0}
    .reader-content img{border-radius:var(--radius-sm);margin:.8em 0;width:100%;height:auto;display:block}
    .reader-content img.img-err{display:none}
    .reader-content a{color:var(--link);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}
    .reader-content figure{margin:1.4em 0}
    .reader-content figcaption{font-size:.8rem;color:var(--text3);text-align:center;margin-top:6px;font-style:italic}
    .reader-content table{width:100%;border-collapse:collapse;margin-bottom:1.2em;font-size:.9em}
    .reader-content th,.reader-content td{padding:7px 11px;border:1px solid var(--border);text-align:left}
    .reader-content th{background:var(--bg2);font-weight:600}

    /* ── VIDEO EMBEDS ── */
    .vid-wrap{margin:1em 0;border-radius:var(--radius);overflow:hidden;background:#000;position:relative}
    .vid-ratio{position:relative;padding-top:56.25%}
    .vid-ratio.portrait{padding-top:min(177.78%,72vh)}
    .vid-ratio iframe,.vid-ratio video{position:absolute;inset:0;width:100%;height:100%;border:none}
    .vid-wrap > video{width:100%;max-height:72vh;display:block;background:#000}
    .vid-label{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
    .vid-label span{background:var(--bg3);padding:2px 7px;border-radius:4px}
    .yt-poster{cursor:pointer}
    .yt-poster-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .yt-poster-play div{width:60px;height:42px;background:rgba(255,0,0,.92);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:transform .15s}
    .yt-poster:hover .yt-poster-play div{transform:scale(1.08)}

    /* ── READER ACTIONS ── */
    .reader-actions{
      position:fixed;bottom:0;left:0;right:0;
      padding:10px 16px;padding-bottom:calc(10px + var(--safe-bottom));
      background:var(--surface);border-top:1px solid var(--border);
      display:flex;gap:7px;z-index:40;
    }
    .action-btn{
      flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
      padding:9px;border-radius:var(--radius-sm);font-size:.78rem;font-weight:600;
      color:var(--text2);background:var(--bg2);transition:all .15s;
    }
    .action-btn:hover{background:var(--bg3);color:var(--text)}
    .action-btn svg{width:16px;height:16px}
    .swipe-hint{
      position:fixed;top:50%;transform:translateY(-50%);
      width:44px;height:44px;background:var(--surface);border:1px solid var(--border);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      color:var(--text2);opacity:0;pointer-events:none;transition:opacity .15s;z-index:200;
      cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);
    }
    .swipe-hint.l{left:8px}.swipe-hint.r{right:8px}
    .swipe-hint.show{opacity:1;pointer-events:auto}
    .swipe-hint svg{width:18px;height:18px}
    .open-ext{
      display:inline-flex;align-items:center;gap:5px;margin-top:20px;
      padding:9px 16px;border:1.5px solid var(--border);border-radius:100px;
      font-size:.85rem;color:var(--text2);transition:all .15s;
    }
    .open-ext:hover{border-color:var(--accent);color:var(--accent)}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);
      background:var(--text);color:var(--bg);padding:9px 18px;border-radius:100px;
      font-size:.85rem;font-weight:500;opacity:0;pointer-events:none;
      transition:opacity .18s,transform .18s;white-space:nowrap;z-index:999;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── SPINNERS ── */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .65s linear infinite}

    /* ══ YOUTUBE CATEGORY MODE ══════════════════════════════ */
    #yt-screen{background:#0f0f0f;color:#fff;height:100dvh;max-height:100dvh}
    #yt-screen .sb{background:#0f0f0f}
    #yt-screen .topbar{background:rgba(15,15,15,.95);border-color:#272727}
    #yt-screen .cat-bar{background:#0f0f0f;border-color:#272727}
    #yt-screen .filter-bar{background:#0f0f0f;border-color:#272727}
    .yt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:0;padding-bottom:calc(16px + var(--safe-bottom))}
    @media(max-width:640px){.yt-grid{grid-template-columns:1fr}}
    .yt-card{cursor:pointer;transition:background .1s;border-bottom:1px solid #272727}
    .yt-card:active{background:#1a1a1a}
    .yt-thumb-wrap{position:relative;padding-top:56.25%;background:#111;overflow:hidden}
    .yt-thumb-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .yt-thumb-wrap .dur{position:absolute;bottom:6px;right:7px;background:rgba(0,0,0,.8);color:#fff;font-size:.72rem;font-weight:600;padding:2px 5px;border-radius:4px}
    .yt-card-info{padding:10px 14px 14px;display:flex;gap:10px}
    .yt-channel-icon{width:36px;height:36px;border-radius:50%;background:#444;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.875rem;font-weight:700;color:#fff;overflow:hidden}
    .yt-card-meta{flex:1;min-width:0}
    .yt-card-title{font-size:.9rem;font-weight:600;line-height:1.35;color:#fff;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .yt-card-sub{font-size:.78rem;color:#aaa}
    /* hide-channel button on YT cards */
    .yt-hide-btn{background:rgba(255,255,255,.08);border:1px solid #444;color:#aaa;font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;margin-top:5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
    .yt-hide-btn:hover{background:rgba(255,80,80,.2);border-color:#f87171;color:#f87171}

    /* ── SETTINGS PANEL ── */
    .settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
    .settings-overlay.open{display:flex}
    .settings-panel{
      width:100%;background:var(--surface);border-radius:20px 20px 0 0;
      padding:20px 20px calc(20px + var(--safe-bottom));
      max-height:85dvh;overflow-y:auto;
    }
    .settings-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
    .settings-title{font-family:var(--display);font-size:1.2rem;font-weight:700;margin-bottom:16px}
    .settings-section-title{font-size:.7rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin:18px 0 6px;padding-top:6px;border-top:1px solid var(--border)}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
    .setting-row:last-child{border-bottom:none}
    .setting-row.col{flex-direction:column;align-items:flex-start;gap:8px}
    .setting-label{font-size:.9rem;font-weight:600}
    .setting-sub{font-size:.78rem;color:var(--text3);margin-top:2px}
    .setting-btn{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;color:var(--text);transition:all .15s}
    .setting-btn:hover{background:var(--bg3)}
    .setting-btn.danger{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
    @media(prefers-color-scheme:dark){.setting-btn.danger{background:#2d1515;color:#fca5a5;border-color:#7f1d1d}}
    .setting-select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:.85rem}

    /* Category checkboxes in settings */
    .cat-checkbox-list{width:100%;display:flex;flex-direction:column;gap:6px}
    .cat-checkbox-item{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg2);border-radius:var(--radius-sm);font-size:.875rem;cursor:pointer}
    .cat-checkbox-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}

    /* Hidden channels list */
    .hidden-ch-list{width:100%;display:flex;flex-direction:column;gap:5px}
    .hidden-ch-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg2);border-radius:var(--radius-sm);font-size:.83rem}
    .hidden-ch-item button{font-size:.72rem;color:var(--accent);font-weight:700;padding:3px 8px;border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:4px}
  </style>
</head>
<body>

<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <h1>FreshReader</h1>
      <p>Your RSS Reader</p>
    </div>
    <div class="field">
      <label>Server URL</label>
      <input id="srv" type="url" placeholder="https://rss.example.com" />
    </div>
    <div class="field">
      <label>Username</label>
      <input id="usr" type="text" />
    </div>
    <div class="field">
      <label>App Password</label>
      <input id="pwd" type="password" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="login()">Login</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<div id="app-screen" class="screen">
  <div class="sb"></div>
  <div class="topbar">
    <div class="topbar-title">FreshReader</div>
    <button class="icon-btn" onclick="openSettings()">⚙️</button>
  </div>
  
  <div class="cat-bar" id="cat-bar"></div>
  <div class="feed-bar" id="feed-bar"></div>

  <div class="filter-bar">
    <div class="filter-pills">
      <button class="filter-btn active" id="filter-unread" onclick="setFilter('unread')">Unread</button>
      <button class="filter-btn" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="filter-starred" onclick="setFilter('starred')">Starred</button>
    </div>
    <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
  </div>

  <div class="article-list" id="list-content"></div>
</div>

<div id="yt-screen" class="screen">
  <div class="sb"></div>
  <div class="topbar">
    <div class="topbar-title">YouTube Subscriptions</div>
    <button class="icon-btn" onclick="showScreen('app-screen')">🔙</button>
  </div>
  
  <div class="cat-bar" id="yt-cat-bar"></div>
  <div class="feed-bar" id="yt-feed-bar"></div>

  <div class="filter-bar">
    <div class="filter-pills">
      <button class="filter-btn active" id="yt-filter-unread" onclick="setFilter('unread')">Unread</button>
      <button class="filter-btn" id="yt-filter-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="yt-filter-starred" onclick="setFilter('starred')">Starred</button>
    </div>
    <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
  </div>

  <div class="yt-grid" id="yt-list-content"></div>
</div>

<div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this) closeSettings()">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-title">Settings</div>
    <div class="setting-row">
      <span>Logout</span>
      <button class="setting-btn danger" onclick="clearSession()">Logout</button>
    </div>

    <div class="settings-section-title">Hidden Channels</div>
    <div class="hidden-ch-list" id="hidden-ch-list"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // Global Application State
  const S = {
    server: '',
    auth: '',
    user: '',
    cats: [],
    articles: [],
    currentCat: null,
    currentFeed: null,
    filter: 'unread',       // DEFAULT TO UNREAD
    shortsFilter: 'unread', // DEFAULT TO UNREAD
    readSet: new Set(),
    starSet: new Set(),
    excludedCatIds: new Set(),
    hiddenChannels: new Set(),
    continuation: null      // PAGINATION TOKEN
  };

  const DB_KEY = 'fr_articles';
  const STAR_CACHE_KEY = 'fr_starred';

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function toast(msg, dur = 2000) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), dur);
  }

  function clearSession() {
    localStorage.removeItem('fr_auth');
    localStorage.removeItem('fr_server');
    localStorage.removeItem('fr_user');
    location.reload();
  }

    // Helper to ensure all API calls go through the GReader PHP endpoint
  function getApiUrl(path) {
    let base = S.server.trim().replace(/\/$/, '');
    // Auto-append the greader API endpoint if the user didn't type it
    if (!base.endsWith('/api/greader.php')) {
      base += '/api/greader.php';
    }
    return base + path;
  }

  async function apiGet(path) {
    const url = getApiUrl(path);
    const headers = { 'Authorization': `GoogleLogin auth=${S.auth}` };
    const res = await fetch(url, { headers });
    if (!res.ok) throw new Error('API Error: ' + res.status);
    return res;
  }

  async function apiPost(path, data = {}) {
    const url = getApiUrl(path);
    const headers = { 
      'Authorization': `GoogleLogin auth=${S.auth}`,
      'Content-Type': 'application/x-www-form-urlencoded' 
    };
    const body = new URLSearchParams(data).toString();
    const res = await fetch(url, { method: 'POST', headers, body });
    if (!res.ok) throw new Error('API Error: ' + res.status);
    return res;
  }

  async function loadApp() {
    showScreen('app-screen');
    await loadCategories();
    await loadArticles();
  }

  async function loadCategories() {
    const res = await apiGet('/reader/api/0/subscription/list?output=json');
    const data = await res.json();
    
    // Group subscriptions by category
    const catMap = {};
    data.subscriptions.forEach(sub => {
      const cat = sub.categories && sub.categories[0] ? sub.categories[0].label : 'Uncategorized';
      if (!catMap[cat]) catMap[cat] = { id: sub.categories && sub.categories[0] ? sub.categories[0].id : cat, label: cat, feeds: [] };
      catMap[cat].feeds.push(sub);
    });
    
    S.cats = Object.values(catMap);

    // MERGE "YT Shorts" INTO "YouTube"
    let ytCat = S.cats.find(c => c.label.toLowerCase() === 'youtube');
    let shortsCatIndex = S.cats.findIndex(c => c.label.toLowerCase() === 'yt shorts');
    if (ytCat && shortsCatIndex !== -1) {
      let shortsCat = S.cats[shortsCatIndex];
      // Move all feeds from Shorts category into the main YouTube category
      ytCat.feeds.push(...shortsCat.feeds);
      // Remove the standalone Shorts category
      S.cats.splice(shortsCatIndex, 1);
    }
    
    renderCatTabs();
  }

  async function loadArticles(isLoadMore = false) {
    const el = document.getElementById('list-content');
    const ytEl = document.getElementById('yt-list-content');
    if (!isLoadMore) {
      el.innerHTML = '<div class="empty"><div class="skel" style="width:100%"><div class="skel-line"></div><div class="skel-line"></div></div></div>';
      ytEl.innerHTML = el.innerHTML;
    }

    let streamId = S.currentFeed || (S.currentCat && S.currentCat !== 'all' ? S.currentCat : 'user/-/state/com.google/reading-list');
    
    // Check if we are in a custom sub-filter mode, if so, load the base youtube cat to filter locally
    if (S.currentFeed === 'shorts_sub_filter' || S.currentFeed === 'hidden_sub_filter') {
        streamId = S.currentCat;
    }

    let url = `/reader/api/0/stream/contents/${encodeURIComponent(streamId)}?n=50`;
    
    // Apply pagination
    if (isLoadMore && S.continuation) {
      url += `&c=${S.continuation}`;
    }

    try {
      const res = await apiGet(url);
      const data = await res.json();
      
      S.continuation = data.continuation || null;

      if (isLoadMore) {
        S.articles.push(...data.items);
      } else {
        S.articles = data.items;
      }
      
      // Update read/starred sets
      data.items.forEach(a => {
        if (a.categories.some(c => c.includes('read'))) S.readSet.add(a.id);
        if (a.categories.some(c => c.includes('starred'))) S.starSet.add(a.id);
      });

      renderArticleList();
    } catch (e) {
      toast('Failed to load articles');
    }
  }

  function visibleArticles() {
    let arts = S.articles;
    
    // 1. Unread/Starred Filter
    if (S.filter === 'unread') {
      arts = arts.filter(a => !S.readSet.has(a.id));
    } else if (S.filter === 'starred') {
      arts = arts.filter(a => S.starSet.has(a.id));
    }

    // 2. Determine if we are viewing YouTube feeds
    const activeCatObj = S.cats.find(c => c.id === S.currentCat);
    const isYouTube = activeCatObj && activeCatObj.label.toLowerCase() === 'youtube';

    // 3. Handle Sub-filters (Shorts & Hidden)
    if (isYouTube) {
      if (S.currentFeed === 'shorts_sub_filter') {
        arts = arts.filter(a => (a.canonical && a.canonical[0].href.includes('/shorts/')));
        // Also strip hidden channels from shorts
        arts = arts.filter(a => !S.hiddenChannels.has(a.author));
      } else if (S.currentFeed === 'hidden_sub_filter') {
        // ONLY show hidden channels
        return arts.filter(a => S.hiddenChannels.has(a.author));
      } else {
        // Main YouTube feed: Remove hidden channels AND shorts
        arts = arts.filter(a => !S.hiddenChannels.has(a.author) && !(a.canonical && a.canonical[0].href.includes('/shorts/')));
      }
    } else {
      // Hide channels globally on non-YouTube feeds if needed
      arts = arts.filter(a => !S.hiddenChannels.has(a.author));
    }

    return arts;
  }

  function renderCatTabs() {
    const el = document.getElementById('cat-bar');
    const ytEl = document.getElementById('yt-cat-bar');
    
    const html = `
      <button class="cat-tab ${!S.currentCat ? 'active' : ''}" onclick="selectCat(null)">All</button>
      ${S.cats.map(c => `<button class="cat-tab ${S.currentCat === c.id ? 'active' : ''}" onclick="selectCat('${esc(c.id)}')">${esc(c.label)}</button>`).join('')}
    `;
    
    el.innerHTML = html;
    ytEl.innerHTML = html;
  }

  function renderFeedTabs() {
    const el = document.getElementById('feed-bar');
    const ytEl = document.getElementById('yt-feed-bar');
    const cat = S.cats.find(c => c.id === S.currentCat);
    
    if (!cat || !cat.feeds.length) {
      el.classList.add('hidden');
      ytEl.classList.add('hidden');
      return;
    }
    
    el.classList.remove('hidden');
    ytEl.classList.remove('hidden');

    let html = `<button class="feed-tab ${!S.currentFeed ? 'active' : ''}" onclick="selectFeed(null)">All ${esc(cat.label)}</button>`;
    
    // Inject Custom Sub-Filters for YouTube Category
    if (cat.label.toLowerCase() === 'youtube') {
      html += `<button class="feed-tab ${S.currentFeed === 'shorts_sub_filter' ? 'active' : ''}" onclick="selectFeed('shorts_sub_filter')">Shorts</button>`;
      html += `<button class="feed-tab ${S.currentFeed === 'hidden_sub_filter' ? 'active' : ''}" onclick="selectFeed('hidden_sub_filter')">Hidden Channels</button>`;
    }

    html += cat.feeds.map(f => `<button class="feed-tab ${S.currentFeed === f.id ? 'active' : ''}" onclick="selectFeed('${esc(f.id)}')">${esc(f.title)}</button>`).join('');
    
    el.innerHTML = html;
    ytEl.innerHTML = html;
  }

  function selectCat(id) {
    S.currentCat = id;
    S.currentFeed = null;
    S.continuation = null; // Reset pagination
    const cat = S.cats.find(c => c.id === id);
    if (cat && cat.label.toLowerCase() === 'youtube') {
      showScreen('yt-screen');
    } else {
      showScreen('app-screen');
    }
    renderCatTabs();
    renderFeedTabs();
    loadArticles();
  }

  function selectFeed(id) {
    S.currentFeed = id;
    S.continuation = null; // Reset pagination
    renderFeedTabs();
    loadArticles();
  }

  function setFilter(f) {
    S.filter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('filter-' + f)?.classList.add('active');
    document.getElementById('yt-filter-' + f)?.classList.add('active');
    renderArticleList();
  }

  async function loadMoreArticles() {
    const btn = document.getElementById('load-more-btn');
    if(btn) btn.innerText = 'Loading...';
    await loadArticles(true);
  }

  function renderArticleList() {
    const activeCatObj = S.cats.find(c => c.id === S.currentCat);
    const isYouTube = activeCatObj && activeCatObj.label.toLowerCase() === 'youtube';

    if (isYouTube) {
      renderYtGrid();
      return;
    }

    const el = document.getElementById('list-content');
    const arts = visibleArticles();

    if (!arts.length) {
      el.innerHTML = `<div class="empty">No articles found.</div>`;
      return;
    }

    let html = arts.map(a => {
      const isRead = S.readSet.has(a.id);
      return `
        <div class="article-card ${isRead ? 'read' : ''}" onclick="toggleRead('${a.id}')">
          <div class="card-title">${esc(a.title)}</div>
          <div class="card-meta">
            <span class="card-feed">${esc(a.origin ? a.origin.title : 'Unknown')}</span>
            ${!isRead ? '<div class="unread-dot"></div>' : ''}
          </div>
        </div>
      `;
    }).join('');

    // Pagination Button
    if (S.continuation) {
      html += `
        <div style="padding: 20px; text-align: center;">
          <button id="load-more-btn" class="btn-primary" onclick="loadMoreArticles()" style="width: auto; padding: 10px 30px;">
            Load More Pages (50)
          </button>
        </div>
      `;
    }

    el.innerHTML = html;
  }

  function renderYtGrid() {
    const el = document.getElementById('yt-list-content');
    const arts = visibleArticles();

    if (!arts.length) {
      el.innerHTML = `<div class="empty">No videos found.</div>`;
      return;
    }

    let html = arts.map(a => {
      const isRead = S.readSet.has(a.id);
      // Try to extract thumbnail
      let thumb = '';
      const match = a.summary?.content?.match(/src="([^"]+)"/);
      if (match) thumb = match[1];

      return `
        <div class="yt-card ${isRead ? 'read' : ''}" onclick="toggleRead('${a.id}')">
          <div class="yt-thumb-wrap">
            <img src="${esc(thumb)}" />
            ${!isRead ? '<div class="unread-dot" style="position:absolute; top:8px; right:8px; z-index:10;"></div>' : ''}
          </div>
          <div class="yt-card-info">
            <div class="yt-card-meta">
              <div class="yt-card-title">${esc(a.title)}</div>
              <div class="yt-card-sub">${esc(a.author || a.origin?.title)}</div>
              <button class="yt-hide-btn" onclick="event.stopPropagation(); hideChannel('${esc(a.author)}')">Hide Channel</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Pagination Button
    if (S.continuation) {
      html += `
        <div style="padding: 20px; text-align: center; grid-column: 1 / -1;">
          <button id="load-more-btn" class="btn-primary" onclick="loadMoreArticles()" style="width: auto; padding: 10px 30px; background: #333; color: #fff;">
            Load More Videos
          </button>
        </div>
      `;
    }

    el.innerHTML = html;
  }

  function toggleRead(id) {
    if (S.readSet.has(id)) {
      S.readSet.delete(id);
      // In real app, make API call to unmark read
    } else {
      S.readSet.add(id);
      // In real app, make API call to mark read
    }
    renderArticleList();
  }

  function markAllRead() {
    const arts = visibleArticles();
    arts.forEach(a => S.readSet.add(a.id));
    // In real app, make API call to mark all read
    renderArticleList();
    toast('Marked all as read');
  }

  // ═══════════════════════════════════════════════════════════
  // CHANNEL HIDING LOGIC
  // ═══════════════════════════════════════════════════════════
  function hideChannel(author) {
    if (!author) return;
    S.hiddenChannels.add(author);
    saveHiddenChannels();
    toast(`Channel ${author} hidden`);
    renderArticleList(); // Re-render feeds to remove channel immediately
    renderHiddenChannelsList();
  }

  function unhideChannel(author) {
    S.hiddenChannels.delete(author);
    saveHiddenChannels();
    toast(`Channel ${author} restored`);
    renderArticleList();
    renderHiddenChannelsList();
  }

  function saveHiddenChannels() {
    localStorage.setItem('fr_hidden_channels', JSON.stringify([...S.hiddenChannels]));
  }

  function loadHiddenChannels() {
    try {
      const data = localStorage.getItem('fr_hidden_channels');
      if (data) S.hiddenChannels = new Set(JSON.parse(data));
    } catch(e) {}
  }

  // ═══════════════════════════════════════════════════════════
  // SETTINGS
  // ═══════════════════════════════════════════════════════════
  function openSettings() {
    document.getElementById('settings-overlay').classList.add('open');
    renderHiddenChannelsList();
  }
  
  function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('open');
  }

  function renderHiddenChannelsList() {
    const container = document.getElementById('hidden-ch-list');
    if (!S.hiddenChannels.size) {
      container.innerHTML = '<div style="font-size:.82rem;color:var(--text3)">No channels hidden yet. Use the "Hide Channel" button on any video.</div>';
      return;
    }
    container.innerHTML = [...S.hiddenChannels].map(key => `
      <div class="hidden-ch-item">
        <span>${esc(key)}</span>
        <button onclick="unhideChannel('${esc(key)}')">Unhide</button>
      </div>
    `).join('');
  }

  // ═══════════════════════════════════════════════════════════
  // AUTH / BOOTSTRAP
  // ═══════════════════════════════════════════════════════════


  async function login() {
    let srv = document.getElementById('srv').value.trim().replace(/\/$/, '');
    const usr = document.getElementById('usr').value.trim();
    const pwd = document.getElementById('pwd').value;
    const err = document.getElementById('login-err');
    
    if (!srv || !usr || !pwd) {
      err.innerText = "Please fill all fields";
      err.style.display = 'block';
      return;
    }

    // Auto-append the greader API endpoint if missing
    if (!srv.endsWith('/api/greader.php')) {
      srv += '/api/greader.php';
    }

    try {
      // The Google Reader API uses /accounts/ClientLogin
      const url = srv + '/accounts/ClientLogin?Email=' + encodeURIComponent(usr) + '&Passwd=' + encodeURIComponent(pwd);
      const res = await fetch(url);
      const text = await res.text();
      
      if (text.includes('Auth=')) {
        const authMatch = text.match(/Auth=([^\n]+)/);
        if (authMatch) {
          S.auth = authMatch[1];
          S.server = srv; // Save the properly formatted URL
          S.user = usr;
          localStorage.setItem('fr_server', srv);
          localStorage.setItem('fr_auth', S.auth);
          localStorage.setItem('fr_user', usr);
          err.style.display = 'none';
          loadApp();
        }
      } else {
        throw new Error('Invalid credentials');
      }
    } catch(e) {
      err.innerText = "Login failed. Check URL and credentials.";
      err.style.display = 'block';
    }
  }
  // Init
  loadHiddenChannels();
  if (localStorage.getItem('fr_auth')) {
    S.server = localStorage.getItem('fr_server');
    S.auth = localStorage.getItem('fr_auth');
    S.user = localStorage.getItem('fr_user');
    loadApp();
  }
</script>
</body>
</html>
