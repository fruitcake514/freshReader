<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FreshReader</title>
  <meta name="description" content="Mobile PWA client for FreshRSS" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#b45309" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FreshReader" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1170x2532.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1179x2556.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1290x2796.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:428px) and (device-height:926px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1284x2778.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3)" href="splash/splash-1125x2436.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:2)" href="splash/splash-828x1792.png"/>
  <link rel="apple-touch-startup-image" media="screen and (device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2)" href="splash/splash-750x1334.png"/>
  <meta name="msapplication-TileColor" content="#b45309" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --serif: 'Source Serif 4', Georgia, serif;
      --display: 'Playfair Display', Georgia, serif;
      --bg: #f5f0e8; --bg2: #ede8e0; --bg3: #d8d2c8;
      --surface: #faf8f4; --border: #d8d2c8;
      --text: #1c1917; --text2: #57534e; --text3: #a8a29e;
      --accent: #b45309; --accent-bg: #fef3c7;
      --unread: #dc2626; --link: #0f4c81;
      --radius: 12px; --radius-sm: 8px;
      --nav-h: 52px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#111118; --bg2:#1a1a25; --bg3:#22222f;
        --surface:#16161f; --border:#2e2e3e;
        --text:#e8e6e3; --text2:#9b98a8; --text3:#5a5870;
        --accent:#f59e0b; --accent-bg:#292310;
        --unread:#f87171; --link:#93c5fd;
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;-webkit-text-size-adjust:100%}
    body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100%;overflow-x:hidden;line-height:1.6}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    input{font-family:inherit}
    a{color:var(--link)}
    img{max-width:100%;height:auto}
    video{max-width:100%}

    /* ── SCREENS ── */
    .screen{display:none;min-height:100dvh;flex-direction:column}
    .screen.active{display:flex}

    /* ── STATUS BAR SPACER ── */
    .sb{height:var(--safe-top);background:var(--surface);flex-shrink:0;position:sticky;top:0;z-index:60}

    /* ── LOGIN ── */
    #login-screen{align-items:center;justify-content:center;padding:24px;padding-top:calc(24px + var(--safe-top))}
    .login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
    .login-logo{text-align:center;margin-bottom:28px}
    .login-logo h1{font-family:var(--display);font-size:2rem;font-weight:700;letter-spacing:-.03em}
    .login-logo p{font-size:.875rem;color:var(--text3);margin-top:4px;font-style:italic}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
    .field input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:1rem;outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--accent)}
    .btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-size:1rem;font-weight:600;margin-top:6px;transition:opacity .15s,transform .1s}
    .btn-primary:active{transform:scale(.98)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .login-err{margin-top:10px;padding:9px 13px;background:#fee2e2;color:#991b1b;border-radius:var(--radius-sm);font-size:.85rem;display:none}
    @media(prefers-color-scheme:dark){.login-err{background:#2d1515;color:#fca5a5}}

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:var(--safe-top);z-index:50;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:6px;
      padding:0 12px;height:var(--nav-h);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .topbar-title{font-family:var(--display);font-size:1.2rem;font-weight:700;letter-spacing:-.02em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--text2);transition:background .15s,color .15s;flex-shrink:0}
    .icon-btn:hover,.icon-btn:focus-visible{background:var(--bg2);color:var(--text)}
    .icon-btn svg{width:19px;height:19px}

    /* ── CATEGORY BAR ── */
    .cat-bar{
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;gap:4px;padding:7px 10px;
      overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
      position:sticky;top:calc(var(--safe-top) + var(--nav-h));z-index:40;
    }
    .cat-bar::-webkit-scrollbar{display:none}
    .cat-tab{
      display:inline-flex;align-items:center;gap:5px;padding:5px 13px;
      border-radius:100px;font-size:.8rem;font-weight:600;white-space:nowrap;
      color:var(--text2);border:1.5px solid transparent;transition:all .15s;flex-shrink:0;
    }
    .cat-tab:hover{background:var(--bg2);color:var(--text)}
    .cat-tab.active{background:var(--accent-bg);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
    .cat-tab .badge{background:var(--unread);color:#fff;font-size:.65rem;font-weight:700;border-radius:100px;padding:1px 5px}

    /* ── FEED BAR ── */
    .feed-bar{
      background:var(--bg2);border-bottom:1px solid var(--border);
      display:flex;gap:5px;padding:6px 10px;
      overflow-x:auto;scrollbar-width:none;
    }
    .feed-bar::-webkit-scrollbar{display:none}
    .feed-bar.hidden{display:none}
    .feed-tab{
      display:inline-flex;align-items:center;gap:4px;padding:4px 11px;
      border-radius:6px;font-size:.75rem;font-weight:600;white-space:nowrap;
      color:var(--text2);background:var(--surface);border:1px solid var(--border);
      transition:all .15s;flex-shrink:0;
    }
    .feed-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .feed-tab .badge{background:rgba(255,255,255,.25);font-size:.6rem;font-weight:700;border-radius:4px;padding:1px 4px}
    .feed-tab:not(.active) .badge{background:var(--bg3);color:var(--text3)}

    /* ── FILTER BAR ── */
    .filter-bar{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface);
    }
    .filter-pills{display:flex;gap:5px}
    .filter-btn{font-size:.72rem;font-weight:600;color:var(--text2);padding:4px 9px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
    .filter-btn.active{background:var(--accent-bg);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
    .mark-all-btn{font-size:.72rem;font-weight:600;color:var(--text3);padding:4px 8px}
    .mark-all-btn:hover{color:var(--text)}

    /* ── ARTICLE LIST ── */
    .article-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe-bottom))}
    .article-card{
      padding:14px 18px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:background .1s;position:relative;
      display:flex;flex-direction:column;gap:5px;
    }
    .article-card:active{background:var(--bg2)}
    .article-card.read{opacity:.6}
    .article-card.read .card-title{font-weight:400}
    .card-meta{display:flex;align-items:center;gap:7px;font-size:.72rem;color:var(--text3)}
    .card-feed{font-weight:600;color:var(--accent);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card-title{font-family:var(--display);font-size:1rem;font-weight:700;line-height:1.3;letter-spacing:-.015em}
    .card-snippet{font-size:.85rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-thumb{width:68px;height:52px;border-radius:7px;object-fit:cover;flex-shrink:0;float:right;margin-left:10px;margin-bottom:3px}
    .unread-dot{width:7px;height:7px;background:var(--unread);border-radius:50%;flex-shrink:0;margin-left:auto}

    /* ── EMPTY / LOADING ── */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:10px;color:var(--text3);text-align:center}
    .empty svg{opacity:.35}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .skel{animation:pulse 1.4s infinite}
    .skel-line{height:13px;background:var(--bg3);border-radius:4px;margin-bottom:7px}

    /* ── READER SCREEN ── */
    #reader-screen{background:var(--bg);overflow:hidden}
    .reader-topbar{
      position:sticky;top:var(--safe-top);z-index:50;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:6px;
      padding:0 10px;height:var(--nav-h);backdrop-filter:blur(12px);
    }
    .reader-topbar-feed{flex:1;font-size:.85rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .reader-counter{font-size:.72rem;color:var(--text3);white-space:nowrap;flex-shrink:0}
    .reader-swipe{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:transform .24s cubic-bezier(.4,0,.2,1),opacity .18s}
    .reader-swipe.out-left{transform:translateX(-60px);opacity:0;pointer-events:none}
    .reader-swipe.out-right{transform:translateX(60px);opacity:0;pointer-events:none}
    .reader-swipe.in-left{transform:translateX(60px);opacity:0;transition:none}
    .reader-swipe.in-right{transform:translateX(-60px);opacity:0;transition:none}
    .reader-body{max-width:680px;margin:0 auto;padding:20px 18px calc(80px + var(--safe-bottom))}
    .reader-feed-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
    .reader-title{font-family:var(--display);font-size:clamp(1.4rem,5vw,2rem);font-weight:700;line-height:1.2;letter-spacing:-.03em;margin-bottom:14px}
    .reader-byline{font-size:.8rem;color:var(--text3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
    .reader-content{font-size:1.05rem;line-height:1.75;color:var(--text)}
    .reader-content h1,.reader-content h2,.reader-content h3{font-family:var(--display);margin:1.4em 0 .4em;line-height:1.2;letter-spacing:-.02em}
    .reader-content h1{font-size:1.6rem}.reader-content h2{font-size:1.3rem}.reader-content h3{font-size:1.1rem}
    .reader-content p{margin-bottom:1.2em}
    .reader-content ul,.reader-content ol{padding-left:1.4em;margin-bottom:1.2em}
    .reader-content li{margin-bottom:.35em}
    .reader-content blockquote{border-left:3px solid var(--accent);margin:1.4em 0;padding:.6em .9em;background:var(--accent-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-style:italic}
    .reader-content pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.9em;overflow-x:auto;font-size:.875em;margin-bottom:1.2em}
    .reader-content code{background:var(--bg3);padding:.12em .35em;border-radius:4px;font-size:.9em}
    .reader-content pre code{background:none;padding:0}
    .reader-content img{border-radius:var(--radius-sm);margin:.8em 0;width:100%;height:auto;display:block}
    .reader-content img.img-err{display:none}
    .reader-content a{color:var(--link);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}
    .reader-content figure{margin:1.4em 0}
    .reader-content figcaption{font-size:.8rem;color:var(--text3);text-align:center;margin-top:6px;font-style:italic}
    .reader-content table{width:100%;border-collapse:collapse;margin-bottom:1.2em;font-size:.9em}
    .reader-content th,.reader-content td{padding:7px 11px;border:1px solid var(--border);text-align:left}
    .reader-content th{background:var(--bg2);font-weight:600}

    /* ── VIDEO EMBEDS ── */
    .vid-wrap{margin:1em 0;border-radius:var(--radius);overflow:hidden;background:#000;position:relative}
    .vid-ratio{position:relative;padding-top:56.25%} /* 16:9 */
    .vid-ratio.portrait{padding-top:min(177.78%,72vh)}
    .vid-ratio iframe,.vid-ratio video{position:absolute;inset:0;width:100%;height:100%;border:none}
    /* native video not in ratio box */
    .vid-wrap > video{width:100%;max-height:72vh;display:block;background:#000}
    .vid-label{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
    .vid-label span{background:var(--bg3);padding:2px 7px;border-radius:4px}
    /* YouTube poster */
    .yt-poster{cursor:pointer}
    .yt-poster-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .yt-poster-play div{width:60px;height:42px;background:rgba(255,0,0,.92);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:transform .15s}
    .yt-poster:hover .yt-poster-play div{transform:scale(1.08)}

    /* ── READER ACTIONS ── */
    .reader-actions{
      position:fixed;bottom:0;left:0;right:0;
      padding:10px 16px;padding-bottom:calc(10px + var(--safe-bottom));
      background:var(--surface);border-top:1px solid var(--border);
      display:flex;gap:7px;z-index:40;
    }
    .action-btn{
      flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
      padding:9px;border-radius:var(--radius-sm);font-size:.78rem;font-weight:600;
      color:var(--text2);background:var(--bg2);transition:all .15s;
    }
    .action-btn:hover{background:var(--bg3);color:var(--text)}
    .action-btn svg{width:16px;height:16px}
    .swipe-hint{
      position:fixed;top:50%;transform:translateY(-50%);
      width:30px;height:30px;background:var(--surface);border:1px solid var(--border);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      color:var(--text3);opacity:0;pointer-events:none;transition:opacity .15s;z-index:30;
    }
    .swipe-hint.l{left:5px}.swipe-hint.r{right:5px}
    .swipe-hint.show{opacity:1}
    .swipe-hint svg{width:13px;height:13px}
    .open-ext{
      display:inline-flex;align-items:center;gap:5px;margin-top:20px;
      padding:9px 16px;border:1.5px solid var(--border);border-radius:100px;
      font-size:.85rem;color:var(--text2);transition:all .15s;
    }
    .open-ext:hover{border-color:var(--accent);color:var(--accent)}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);
      background:var(--text);color:var(--bg);padding:9px 18px;border-radius:100px;
      font-size:.85rem;font-weight:500;opacity:0;pointer-events:none;
      transition:opacity .18s,transform .18s;white-space:nowrap;z-index:999;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── SPINNERS ── */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .65s linear infinite}

    /* ══ YOUTUBE CATEGORY MODE ══════════════════════════════ */
    #yt-screen{background:#0f0f0f;color:#fff}
    #yt-screen .sb{background:#0f0f0f}
    #yt-screen .topbar{background:rgba(15,15,15,.95);border-color:#272727}
    #yt-screen .cat-bar{background:#0f0f0f;border-color:#272727}
    #yt-screen .filter-bar{background:#0f0f0f;border-color:#272727}
    .yt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:0;padding-bottom:calc(16px + var(--safe-bottom))}
    @media(max-width:640px){.yt-grid{grid-template-columns:1fr}}
    .yt-card{cursor:pointer;transition:background .1s;border-bottom:1px solid #272727}
    .yt-card:active{background:#1a1a1a}
    .yt-thumb-wrap{position:relative;padding-top:56.25%;background:#111;overflow:hidden}
    .yt-thumb-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .yt-thumb-wrap .dur{position:absolute;bottom:6px;right:7px;background:rgba(0,0,0,.8);color:#fff;font-size:.72rem;font-weight:600;padding:2px 5px;border-radius:4px}
    .yt-card-info{padding:10px 14px 14px;display:flex;gap:10px}
    .yt-channel-icon{width:36px;height:36px;border-radius:50%;background:#444;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.875rem;font-weight:700;color:#fff;overflow:hidden}
    .yt-card-meta{flex:1;min-width:0}
    .yt-card-title{font-size:.9rem;font-weight:600;line-height:1.35;color:#fff;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .yt-card-sub{font-size:.78rem;color:#aaa}

    /* YT Reader */
    #yt-reader{background:#0f0f0f;color:#fff}
    #yt-reader .sb{background:#0f0f0f}
    #yt-reader .reader-topbar{background:rgba(15,15,15,.95);border-color:#272727}
    .yt-player-wrap{background:#000;width:100%}
    .yt-player-ratio{position:relative;padding-top:56.25%}
    .yt-player-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
    .yt-player-poster{position:relative;cursor:pointer}
    .yt-video-info{padding:14px 16px}
    .yt-video-title{font-size:1.1rem;font-weight:700;line-height:1.3;color:#fff;margin-bottom:8px}
    .yt-video-meta{font-size:.82rem;color:#aaa;margin-bottom:12px}
    .yt-video-desc{font-size:.875rem;color:#ccc;line-height:1.6;white-space:pre-wrap}
    .yt-actions{display:flex;gap:0;border-top:1px solid #272727;border-bottom:1px solid #272727;margin:10px 0}
    .yt-action-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;font-size:.72rem;color:#aaa;transition:color .15s}
    .yt-action-btn:hover{color:#fff}
    .yt-action-btn svg{width:22px;height:22px}

    /* ══ SHORTS SCREEN (gallery + fullscreen player) ═══════ */
    #shorts-screen{background:#111;color:#fff}
    #shorts-screen .sb{display:none}
    .shorts-gallery{
      padding-top:calc(var(--safe-top) + var(--nav-h) + 8px);
      padding-bottom:calc(16px + var(--safe-bottom));
      display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
    }
    .shorts-gallery-card{position:relative;cursor:pointer;overflow:hidden;aspect-ratio:9/16;background:#000}
    .shorts-gallery-card img{width:100%;height:100%;object-fit:cover;display:block}
    .shorts-gallery-card .play-badge{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;font-size:.6rem;font-weight:700;padding:2px 4px;border-radius:3px}
    .shorts-gallery-card .unread-pip{position:absolute;top:5px;right:5px;width:7px;height:7px;background:#f87171;border-radius:50%}
    .shorts-player{display:none;position:fixed;inset:0;z-index:100;background:#000;flex-direction:column}
    .shorts-player.open{display:flex}
    .shorts-player-topbar{
      position:absolute;top:0;left:0;right:0;
      height:calc(var(--nav-h) + var(--safe-top));padding-top:var(--safe-top);
      display:flex;align-items:center;gap:6px;padding-left:8px;padding-right:8px;

    }
    .shorts-player-topbar .topbar-title{color:#fff;font-size:1rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .shorts-slides{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-ms-overflow-style:none}
    .shorts-slides::-webkit-scrollbar{display:none}
    .short-slide{height:100dvh;scroll-snap-align:start;position:relative;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .short-slide video{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
    .short-slide iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
    .short-overlay{position:absolute;bottom:calc(72px + var(--safe-bottom));left:0;right:58px;padding:0 14px;pointer-events:none;z-index:5}
    .short-title{font-size:.9rem;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

    .short-actions{position:absolute;right:10px;bottom:calc(82px + var(--safe-bottom));display:flex;flex-direction:column;gap:18px;align-items:center;z-index:5}
    .short-action{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}

    /* ── SETTINGS PANEL ── */

      width:100%;background:var(--surface);border-radius:20px 20px 0 0;

    }

<div class="toast" id="toast"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  server:'', auth:'', user:'',
  cats:[], feeds:[],
  articles:[], // current visible list
  cachedArticles:{}, // id→article, persisted
  currentCat:'__all__', currentFeed:null,
  filter:'all',
  readSet:new Set(), starSet:new Set(),
  curIdx:-1, curArticle:null,
  ytArticles:[], ytCurIdx:-1, ytCurArticle:null,
  shortsArticles:[], shortsPlayerIdx:0,
  unreadMap:{},
  cacheDays:7,
};
// Category label keywords that trigger special modes
const SHORTS_KEYWORDS = ['shorts','tiktok','short'];
const YOUTUBE_KEYWORDS = ['youtube','yt','videos'];
function isShortsMode(label){ return SHORTS_KEYWORDS.some(k=>label.toLowerCase().includes(k)); }
function isYoutubeMode(label){ return YOUTUBE_KEYWORDS.some(k=>label.toLowerCase().includes(k)); }
function currentCatLabel(){
  const c = S.cats.find(c=>c.id===S.currentCat);
  return c?c.label:'';
}

// ═══════════════════════════════════════════════════════════
// STORAGE / SESSION
// ═══════════════════════════════════════════════════════════
const DB_KEY='fr_cache';
function saveSession(){ localStorage.setItem('fr_server',S.server); localStorage.setItem('fr_auth',S.auth); localStorage.setItem('fr_user',S.user); }
function clearSession(){ ['fr_server','fr_auth','fr_user'].forEach(k=>localStorage.removeItem(k)); }
function loadCacheDays(){ S.cacheDays=parseInt(localStorage.getItem('fr_cache_days')||'7'); }
function saveCacheDays(){ const v=document.getElementById('cache-days-sel').value; S.cacheDays=parseInt(v); localStorage.setItem('fr_cache_days',v); toast('Auto-delete set'); }
function loadPersistedArticles(){
  try{ const d=localStorage.getItem(DB_KEY); if(d){ const p=JSON.parse(d); Object.assign(S.cachedArticles,p); } }catch(e){}
}
function persistArticles(){
  // Prune by date before saving
  pruneByDate();
  try{ localStorage.setItem(DB_KEY,JSON.stringify(S.cachedArticles)); }catch(e){ console.warn('Cache persist failed',e); }
}
function pruneByDate(){
  if(!S.cacheDays) return;
  const cutoff=Date.now()/1000 - S.cacheDays*86400;
  for(const id in S.cachedArticles){
    const a=S.cachedArticles[id];
    if(a.published && a.published < cutoff) delete S.cachedArticles[id];
  }
}
function cacheArticles(items){
  items.forEach(a=>{ S.cachedArticles[a.id]=a; });
  persistArticles();
}

// ═══════════════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let _tt;
function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),dur);
}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function apiGet(path,params={}){
  params.output='json';
  const qs=new URLSearchParams(params).toString();
  const res=await fetch(`${S.server}/api/greader.php${path}?${qs}`,{headers:{Authorization:`GoogleLogin auth=${S.auth}`}});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
async function apiPost(path,body){
  const res=await fetch(`${S.server}/api/greader.php${path}`,{
    method:'POST',
    headers:{Authorization:`GoogleLogin auth=${S.auth}`,'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams(body).toString()
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

// ═══════════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ═══════════════════════════════════════════════════════════
async function doLogin(){
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  const server=document.getElementById('srv').value.trim().replace(/\/$/,'');
  const user=document.getElementById('usr').value.trim();
  const pass=document.getElementById('pwd').value;
  if(!server||!user||!pass){err.textContent='Please fill all fields.';err.style.display='block';return;}
  err.style.display='none'; btn.disabled=true; btn.textContent='Signing in…';
  try{
    const res=await fetch(`${server}/api/greader.php/accounts/ClientLogin`,{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({Email:user,Passwd:pass}).toString()
    });
    const text=await res.text();
    if(!res.ok) throw new Error('Invalid credentials');
    const m=text.match(/Auth=([^\n]+)/);
    if(!m) throw new Error('Auth token not found');
    S.server=server; S.auth=m[1]; S.user=user;
    saveSession(); await loadApp();
  }catch(e){
    err.textContent=e.message||'Connection failed';err.style.display='block';
  }finally{ btn.disabled=false; btn.textContent='Sign in'; }
}
function doLogout(){
  clearSession(); S.auth=''; S.articles=[]; S.cats=[];
  showScreen('login-screen');
}

async function loadApp(){
  showScreen('app-screen');
  loadPersistedArticles();
  await Promise.all([loadCategories(),loadUnreadCounts()]);
  await loadArticles();
}

async function loadCategories(){
  try{
    const data=await apiGet('/reader/api/0/subscription/list');
    const subs=data.subscriptions||[];
    const catMap={};
    for(const sub of subs){
      const cats=sub.categories||[];
      if(!cats.length){ if(!catMap['__none__']) catMap['__none__']={label:'Uncategorized',feeds:[]}; catMap['__none__'].feeds.push(sub); }
      else{ for(const c of cats){ if(!catMap[c.id]) catMap[c.id]={label:c.label,feeds:[]}; catMap[c.id].feeds.push(sub); } }
    }
    S.cats=Object.entries(catMap).map(([id,v])=>({id,...v}));
    S.feeds=subs;
    window._catList=S.cats;
    renderCatTabs();
  }catch(e){ console.error('loadCategories',e); }
}

async function loadUnreadCounts(){
  try{
    const data=await apiGet('/reader/api/0/unread-count');
    S.unreadMap={};
    (data.unreadcounts||[]).forEach(u=>{ S.unreadMap[u.id]=u.count; });
  }catch(e){}
}

async function loadArticles(){

    let streamId;
    if(S.currentFeed) streamId=S.currentFeed;

    else streamId=S.currentCat;
    if(S.filter==='unread') params.xt='user/-/state/com.google/read';
    else if(S.filter==='starred') streamId='user/-/state/com.google/starred';
    params.s=streamId;
    const data=await apiGet('/reader/api/0/stream/contents',params);
    const items=data.items||[];
    items.forEach(a=>{

function visibleArticles(){

// ═══════════════════════════════════════════════════════════
async function openArticle(idx, dir){
  const arts=visibleArticles();
  const a=arts[idx]; if(!a) return;
  S.curIdx=idx; S.curArticle=a;
  if(dir){ await animateSwipe(dir,()=>renderReader(a)); }
  else{ renderReader(a); showScreen('reader-screen'); }
  updateReaderNav(idx,arts.length);
  if(!S.readSet.has(a.id)){ S.readSet.add(a.id); apiPost('/reader/api/0/edit-tag',{i:a.id,a:'user/-/state/com.google/read'}).catch(()=>{}); }
  updateStarBtn();
}
function navigateArticle(delta){
  const arts=visibleArticles();
  const ni=S.curIdx+delta;
  if(ni<0||ni>=arts.length) return;
  openArticle(ni,delta>0?'next':'prev');
}
function updateReaderNav(idx,total){
  document.getElementById('reader-ctr').textContent=`${idx+1} / ${total}`;
  document.getElementById('sh-l').classList.toggle('show',idx>0);
  document.getElementById('sh-r').classList.toggle('show',idx<total-1);
}
async function animateSwipe(dir,fn){
  const w=document.getElementById('reader-swipe');
  w.classList.add(dir==='next'?'out-left':'out-right');
  await sleep(220);
  fn(); w.scrollTop=0;
  w.classList.remove('out-left','out-right');
  w.classList.add(dir==='next'?'in-left':'in-right');
  w.getBoundingClientRect();
  w.classList.remove('in-left','in-right');
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function renderReader(a){
  const raw=a.summary?.content||a.content?.content||'';

  const feed=a.origin?.title||'';

      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

// ═══════════════════════════════════════════════════════════
// SWIPE GESTURES (reader)
// ═══════════════════════════════════════════════════════════
(function(){
  let sx=0,sy=0,st=0;
  const T=52, MY=80, MT=380;
  document.getElementById('reader-screen').addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; st=Date.now();
  },{passive:true});
  document.getElementById('reader-screen').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    const dt=Date.now()-st;
    if(Math.abs(dx)<T||dy>MY||dt>MT) return;
    const el=document.elementFromPoint(sx,sy);
    if(el&&el.closest('.vid-wrap,iframe,video,.yt-poster')) return;
    if(dx<0) navigateArticle(1); else navigateArticle(-1);
  },{passive:true});
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('reader-screen').classList.contains('active')) return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown') navigateArticle(1);
    if(e.key==='ArrowLeft'||e.key==='ArrowUp') navigateArticle(-1);
    if(e.key==='Escape') closeReader();
  });
})();

// ═══════════════════════════════════════════════════════════
// CATEGORY SCROLL (swipe up/down through cats on mobile, scroll wheel on desktop)
// ═══════════════════════════════════════════════════════════
(function(){
  let sy=0, st=0;
  const catScreens=['app-screen','yt-screen'];
  function swipeCat(dir){
    const ids=[...document.querySelectorAll('.cat-tab')];
    const active=S.cats.findIndex(c=>c.id===S.currentCat);
    const total=S.cats.length;
    let next;
    if(dir>0){ // swipe up = next cat
      if(S.currentCat==='__all__') next=S.cats[0]?.id;
      else if(active<total-1) next=S.cats[active+1]?.id;
    } else {
      if(active===0||S.currentCat==='__all__') return;
      if(active>0) next=S.cats[active-1]?.id;
      else next='__all__';
    }
    if(next) selectCat(next);
  }
  // Touch swipe up/down on the cat bar area
  document.addEventListener('touchstart',e=>{
    const el=e.target.closest('.cat-bar');
    if(!el) return;
    sy=e.touches[0].clientY; st=Date.now();
  },{passive:true});
  document.addEventListener('touchend',e=>{
    const el=e.target.closest('.cat-bar');
    if(!el) return;
    const dy=e.changedTouches[0].clientY-sy;
    const dt=Date.now()-st;
    if(Math.abs(dy)<40||dt>400) return;
    swipeCat(dy<0?1:-1);
  },{passive:true});
  // Mouse scroll wheel on cat bar
  document.addEventListener('wheel',e=>{
    const el=e.target.closest('.cat-bar');
    if(!el) return;
    e.preventDefault();
    swipeCat(e.deltaY>0?1:-1);
  },{passive:false});
})();

function launchYt(id, posterId){

  if(!ratio) return;
  // playsinline=1 keeps video in-page with audio on iOS; fullscreen button still works inside player
  ratio.innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen" allowfullscreen></iframe>`;
  poster.onclick=null;
}

// ═══════════════════════════════════════════════════════════
// SHORTS / TIKTOK MODE — gallery first, fullscreen on tap
// ═══════════════════════════════════════════════════════════
async function loadShortsMode(){
  showScreen('shorts-screen');
  document.getElementById('shorts-title').textContent=currentCatLabel()||'Shorts';
  const gallery=document.getElementById('shorts-gallery');
  gallery.innerHTML='<div style="padding:60px 20px;text-align:center;color:#666">Loading…</div>';
  try{
    const params={n:50,s:S.currentCat};
    const data=await apiGet('/reader/api/0/stream/contents',params);
    const items=data.items||[];
    items.forEach(a=>{
      if((a.categories||[]).includes('user/-/state/com.google/read')) S.readSet.add(a.id);
      if((a.categories||[]).includes('user/-/state/com.google/starred')) S.starSet.add(a.id);
    });
    cacheArticles(items);
    S.shortsArticles=items;
    renderShortsGallery();
  }catch(e){ gallery.innerHTML=`<div style="padding:60px 20px;text-align:center;color:#666">${esc(e.message)}</div>`; }
}

function exitShortsMode(){ selectCat('__all__'); }

function renderShortsGallery(){
  const gallery=document.getElementById('shorts-gallery');
  gallery.innerHTML=S.shortsArticles.map((a,i)=>{
    const raw=a.summary?.content||a.content?.content||'';
    const thumb=getShortThumb(a,raw);
    const read=S.readSet.has(a.id);
    return `<div class="shorts-gallery-card" onclick="openShortsPlayer(${i})">
      ${thumb?`<img src="${esc(thumb)}" loading="lazy" onerror="this.style.background='#222';this.style.display='none'"/>`:'<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#444;font-size:1.5rem">▶</div>'}
      <div class="play-badge">▶</div>
      ${!read?'<div class="unread-pip"></div>':''}
    </div>`;
  }).join('');
}

function getShortThumb(a, raw){
  const tmp=document.createElement('div'); tmp.innerHTML=raw;
  // Video poster attr
  const video=tmp.querySelector('video');
  if(video&&video.getAttribute('poster')) return video.getAttribute('poster');
  // YouTube ID → thumbnail
  const ytId=extractYtId(a.canonical?.[0]?.href||'')||extractYtId(raw);
  if(ytId) return `https://i.ytimg.com/vi/${ytId}/mqdefault.jpg`;
  // First image
  return firstImg(raw)||'';
}

function openShortsPlayer(startIdx){
  S.shortsPlayerIdx=startIdx;
  const player=document.getElementById('shorts-player');
  player.classList.add('open');
  renderShortsSlides(startIdx);
  // Scroll to tapped slide after render
  requestAnimationFrame(()=>{
    const slides=document.getElementById('shorts-slides');
    const el=slides.children[startIdx];
    if(el) el.scrollIntoView({behavior:'instant'});
    // Play the starting slide
    playSlideAt(startIdx);
  });
  // Observe slides for auto-play/pause on scroll
  observeShortsSlides();
}

function closeShortsPlayer(){
  const player=document.getElementById('shorts-player');
  // Pause all videos
  document.querySelectorAll('.short-slide video').forEach(v=>{ try{v.pause();}catch(e){} });
  // Remove all iframes (stops YouTube)
  document.querySelectorAll('.short-slide iframe').forEach(f=>f.remove());
  player.classList.remove('open');
}

function renderShortsSlides(startIdx){
  const slides=document.getElementById('shorts-slides');
  slides.innerHTML=S.shortsArticles.map((a,i)=>{
    const raw=a.summary?.content||a.content?.content||'';
    const title=a.title||'';
    const author=a.author||a.origin?.title||'';
    const starred=S.starSet.has(a.id);
    return `<div class="short-slide" id="ss-${i}" data-idx="${i}">
      ${buildSlideMedia(a,raw,i)}
      <div class="short-overlay">
        <div class="short-title">${esc(title)}</div>
        <div class="short-author">${esc(author)}</div>
      </div>
      <div class="short-actions">
        <div class="short-action" onclick="toggleShortStar(${i})">
          <svg viewBox="0 0 24 24" fill="${starred?'#f59e0b':'none'}" stroke="${starred?'#f59e0b':'white'}" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>${starred?'Saved':'Save'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildSlideMedia(a, raw, idx){
  const tmp=document.createElement('div'); tmp.innerHTML=raw;
  // Native video (TikTok via urlebird, Reddit)
  const video=tmp.querySelector('video');
  if(video){
    const source=video.querySelector('source');
    const src=source?.getAttribute('src')||video.getAttribute('src')||'';
    const poster=video.getAttribute('poster')||'';
    if(src) return `<video src="${esc(src)}" ${poster?`poster="${esc(poster)}"`:''}
      playsinline preload="metadata" loop
      style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0"></video>`;
  }
  // YouTube (iframe in content or URL)
  const ytId=extractYtId(a.canonical?.[0]?.href||'')||extractYtId(raw);
  if(ytId){
    const thumb=`https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
    // Render as poster — tap loads iframe
    return `<div style="position:absolute;inset:0;cursor:pointer" id="sp-poster-${idx}" onclick="loadSlideYt(${idx},'${ytId}')">
      <img src="${esc(thumb)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <div style="width:56px;height:40px;background:rgba(255,0,0,.9);border-radius:8px;display:flex;align-items:center;justify-content:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="8,5 19,12 8,19"/></svg>
        </div>
      </div>
    </div>`;
  }
  return `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#444;font-size:2rem">▶</div>`;
}

function loadSlideYt(idx, id){
  const poster=document.getElementById(`sp-poster-${idx}`);
  if(!poster) return;
  const iframe=document.createElement('iframe');
  iframe.src=`https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&playsinline=1&mute=0`;
  iframe.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen');
  iframe.setAttribute('allowfullscreen','');
  iframe.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;';
  poster.parentNode.insertBefore(iframe, poster);
  poster.remove();
}

function playSlideAt(idx){
  const slide=document.getElementById('ss-'+idx);
  if(!slide) return;
  const video=slide.querySelector('video');
  if(video) video.play().catch(()=>{});
}

function pauseSlideAt(idx){
  const slide=document.getElementById('ss-'+idx);
  if(!slide) return;
  const video=slide.querySelector('video');
  if(video) video.pause();
  // Remove YouTube iframes to stop playback
  slide.querySelectorAll('iframe').forEach(f=>f.remove());
  // Restore poster if it was a YT slide
  const a=S.shortsArticles[idx];
  if(a){
    const raw=a.summary?.content||a.content?.content||'';
    const ytId=extractYtId(a.canonical?.[0]?.href||'')||extractYtId(raw);
    if(ytId&&!slide.querySelector('video')&&!slide.querySelector('iframe')){
      const thumb=`https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
      const div=document.createElement('div');
      div.id=`sp-poster-${idx}`;
      div.style.cssText='position:absolute;inset:0;cursor:pointer';
      div.onclick=()=>loadSlideYt(idx,ytId);
      div.innerHTML=`<img src="${esc(thumb)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
          <div style="width:56px;height:40px;background:rgba(255,0,0,.9);border-radius:8px;display:flex;align-items:center;justify-content:center">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="8,5 19,12 8,19"/></svg>
          </div>
        </div>`;
      slide.insertBefore(div, slide.firstChild);
    }
  }
}

let _shortsObs=null;
function observeShortsSlides(){
  if(_shortsObs) _shortsObs.disconnect();
  const slidesEl=document.getElementById('shorts-slides');
  _shortsObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const idx=parseInt(e.target.dataset.idx);
      if(e.isIntersecting){
        S.shortsPlayerIdx=idx;
        document.getElementById('shorts-player-title').textContent=S.shortsArticles[idx]?.title||'';
        playSlideAt(idx);
        // Mark read
        const a=S.shortsArticles[idx];
        if(a&&!S.readSet.has(a.id)){
          S.readSet.add(a.id);
          apiPost('/reader/api/0/edit-tag',{i:a.id,a:'user/-/state/com.google/read'}).catch(()=>{});
        }
      } else {
        pauseSlideAt(idx);
      }
    });
  },{root:slidesEl,threshold:0.6});
  slidesEl.querySelectorAll('.short-slide').forEach(el=>_shortsObs.observe(el));
}

// Scroll wheel through fullscreen slides
document.getElementById('shorts-slides').addEventListener('wheel',e=>{
  e.preventDefault();
  const el=document.getElementById('shorts-slides');
  el.scrollBy({top:e.deltaY>0?window.innerHeight:-window.innerHeight,behavior:'smooth'});
},{passive:false});

function toggleShortStar(i){
  const a=S.shortsArticles[i]; if(!a) return;
  const starred=S.starSet.has(a.id);
  apiPost('/reader/api/0/edit-tag',{i:a.id,[starred?'r':'a']:'user/-/state/com.google/starred'}).catch(()=>{});
  if(starred) S.starSet.delete(a.id); else S.starSet.add(a.id);
  // Re-render just this slide's action button
  const action=document.querySelector(`#ss-${i} .short-action svg`);
  if(action){
    action.setAttribute('fill',S.starSet.has(a.id)?'#f59e0b':'none');
    action.setAttribute('stroke',S.starSet.has(a.id)?'#f59e0b':'white');
  }
  const span=document.querySelector(`#ss-${i} .short-action span`);
  if(span) span.textContent=S.starSet.has(a.id)?'Saved':'Save';
  toast(starred?'Unstarred':'Saved ★');
}

// ═══════════════════════════════════════════════════════════
// SANITIZE HTML (pass-through FreshRSS content safely)
// ═══════════════════════════════════════════════════════════
function sanitize(html){
  const tmp=document.createElement('div');
  tmp.innerHTML=html;
  // Remove dangerous elements
  tmp.querySelectorAll('script,form,style,link,meta,base').forEach(el=>el.remove());
  // Wrap trusted iframes in ratio box
  tmp.querySelectorAll('iframe').forEach(el=>{
    const src=el.getAttribute('src')||'';
    const ok=['youtube.com','youtube-nocookie.com','youtu.be','twitch.tv','player.twitch.tv','clips.twitch.tv','tiktok.com'];
    if(ok.some(d=>src.includes(d))){
      el.setAttribute('loading','lazy'); el.setAttribute('allowfullscreen','');
      // Replace with YouTube poster if YouTube
      const ytId=extractYtId(src);
      if(ytId){
        const wrap=document.createElement('div');
        wrap.innerHTML=ytPosterHtml(ytId);
        el.parentNode.replaceChild(wrap.firstElementChild,el);
        return;
      }
      if(!el.closest('.vid-ratio')){
        const wrap=document.createElement('div'); wrap.className='vid-wrap';
        const ratio=document.createElement('div'); ratio.className='vid-ratio';
        el.parentNode.insertBefore(wrap,el); wrap.appendChild(ratio); ratio.appendChild(el);
      }
    } else { el.remove(); }
  });
  // Make videos safe and responsive — preserve <audio> children for Reddit CMAF audio
  tmp.querySelectorAll('video').forEach(el=>{
    el.setAttribute('controls',''); el.setAttribute('playsinline',''); el.setAttribute('preload','metadata');
    el.removeAttribute('crossorigin'); // crossorigin blocks Reddit CMAF audio
    el.style.cssText='width:100%;max-height:72vh;display:block;background:#000;border-radius:8px;';
    if(!el.closest('.vid-wrap')){
      const wrap=document.createElement('div'); wrap.className='vid-wrap';
      el.parentNode.insertBefore(wrap,el); wrap.appendChild(el);
    }
  });
  // Preserve and fix <audio> tags inside video elements (Reddit CMAF dual-stream)
  tmp.querySelectorAll('audio').forEach(el=>{
    el.setAttribute('preload','metadata');
    el.removeAttribute('crossorigin');
  });
  // Strip event handlers
  tmp.querySelectorAll('*').forEach(el=>{
    [...el.attributes].forEach(attr=>{
      if(attr.name.startsWith('on')) el.removeAttribute(attr.name);
      if(attr.name==='href'&&attr.value.trim().toLowerCase().startsWith('javascript')) el.removeAttribute('href');
    });
    if(el.tagName==='A'){ el.setAttribute('target','_blank'); el.setAttribute('rel','noopener noreferrer'); }
  });
  // Fix images
  tmp.querySelectorAll('img').forEach(el=>{
    el.setAttribute('loading','lazy');
    el.setAttribute('onerror',"this.classList.add('img-err')");
    el.removeAttribute('width'); el.removeAttribute('height');
    if(!el.style.cssText.includes('absolute')) el.style.cssText='';
  });
  return tmp.innerHTML;
}
function ytPosterHtml(id){
  return `<div class="vid-label"><span>▶ YouTube</span></div>
  <div class="vid-wrap yt-poster" id="ytp-${id}" onclick="launchYt('${id}','ytp-${id}')">
    <div class="vid-ratio" style="background:#000">
      <img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:0;margin:0" onerror="this.style.display='none'"/>
      <div class="yt-poster-play"><div><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="8,5 19,12 8,19"/></svg></div></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// REFRESH
// ═══════════════════════════════════════════════════════════
async function refreshAll(){
  const btn=document.getElementById('refresh-btn');
  if(btn){ const svg=btn.querySelector('svg'); if(svg) svg.classList.add('spin'); btn.disabled=true; }
  try{
    await loadUnreadCounts();
    const label=currentCatLabel();
    if(S.currentCat!=='__all__'&&isShortsMode(label)) await loadShortsMode();
    else if(S.currentCat!=='__all__'&&isYoutubeMode(label)) await loadYoutubeMode();
    else await loadArticles();
    renderCatTabs();
    toast('Refreshed');
  }finally{
    if(btn){ const svg=btn.querySelector('svg'); if(svg) svg.classList.remove('spin'); btn.disabled=false; }
  }
}

// ═══════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════
function openSettings(){
  document.getElementById('settings-user').textContent=`${S.user} @ ${S.server}`;
  document.getElementById('cache-days-sel').value=String(S.cacheDays);
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettingsOutside(e){ if(e.target===document.getElementById('settings-overlay')) document.getElementById('settings-overlay').classList.remove('open'); }
async function clearArticleCache(){
  if(!confirm('Delete cached articles and re-fetch?')) return;
  S.cachedArticles={}; localStorage.removeItem(DB_KEY);
  document.getElementById('settings-overlay').classList.remove('open');
  toast('Cache cleared — reloading…');
  await sleep(500);
  await loadArticles();
}
async function clearAllAndReload(){
  if(!confirm('Reset entire app? This will reload the page.')) return;
  try{
    if('caches' in window){ const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); }
    if('serviceWorker' in navigator){ const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister())); }
    localStorage.removeItem(DB_KEY);
  }catch(e){}
  window.location.reload(true);
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripTags(html){ const t=document.createElement('div'); t.innerHTML=html; return t.textContent||t.innerText||''; }
function firstImg(html){
  const t=document.createElement('div'); t.innerHTML=html;
  for(const img of t.querySelectorAll('img')){
    const src=img.getAttribute('src')||'';
    if(src&&!src.includes('i.ytimg.com')&&!src.includes('img.youtube.com')) return src;
  }
  return null;
}
function extractYtId(text){
  const m=text.match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}
function fmtDate(ts){
  const d=new Date(ts), now=new Date(), diff=(now-d)/1000;
  if(diff<60) return 'just now';
  if(diff<3600) return `${Math.floor(diff/60)}m ago`;
  if(diff<86400) return `${Math.floor(diff/3600)}h ago`;
  if(diff<604800) return `${Math.floor(diff/86400)}d ago`;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function skelHtml(n){ return Array(n).fill(0).map(()=>`<div class="article-card skel"><div class="skel-line" style="width:40%;height:9px"></div><div class="skel-line" style="height:16px;margin-top:7px"></div><div class="skel-line" style="width:80%;height:16px"></div><div class="skel-line" style="height:11px"></div></div>`).join(''); }
function ytSkelHtml(n){ return Array(n).fill(0).map(()=>`<div class="yt-card skel" style="border-color:#272727"><div class="yt-thumb-wrap" style="background:#1a1a1a"></div><div class="yt-card-info"><div class="yt-channel-icon" style="background:#222"></div><div class="yt-card-meta"><div class="skel-line" style="height:12px;background:#222"></div><div class="skel-line" style="height:10px;width:60%;background:#222"></div></div></div></div>`).join(''); }
